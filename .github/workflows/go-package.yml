name: Go Cross-Compile and Release
# v1.1.0

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  validate_tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      is_valid: ${{ steps.check.outputs.is_valid }}
    steps:
      - id: check
        name: Validate full semver tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "is_valid=true" >> "${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "is_valid=true" >> "${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-((alpha|beta|pre|rc)([.-][0-9A-Za-z]+)*))?$ ]]; then
            echo "is_valid=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_valid=false" >> "${GITHUB_OUTPUT}"
            echo "Ref ${GITHUB_REF_NAME} is not main or a valid semver tag like v1.3.0 or v1.3.0-rc.1"
          fi

  build-all:
    runs-on: ubuntu-latest
    needs: validate_tag
    if: needs.validate_tag.outputs.is_valid == 'true'
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Playwright Docker install is module-derived
        run: ./scripts/check-playwright-docker.sh

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Set release date
        run: |
          echo "BUILD_RFC3339=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV

      - name: Determine version
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="dev-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          echo "Building for ${{ matrix.goos }}/${{ matrix.goarch }}"
          mkdir -p dist
          VERSION=${{ steps.vars.outputs.version }}
          BUILD_RFC3339=${BUILD_RFC3339}
          REVISION=${GITHUB_SHA}
          BIN_NAME="${{ vars.GOLANG_APPLICATION }}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.version=${VERSION} -X main.buildRFC3339=${BUILD_RFC3339} -X main.revision=${REVISION}" \
            -o "dist/${BIN_NAME}" ./cmd/${{ vars.GOLANG_APPLICATION }}

      - name: Package archive
        run: |
          cd dist
          VERSION=${{ steps.vars.outputs.version }}
          BASE="${{ vars.GOLANG_APPLICATION }}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${BASE}.zip" "${BASE}.exe"
            rm "${BASE}.exe"
          else
            tar -czf "${BASE}.tar.gz" "${BASE}"
            rm "${BASE}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.GOLANG_APPLICATION }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: [build-all, validate_tag]
    if: needs.validate_tag.outputs.is_valid == 'true' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Generate release notes
        id: notes
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes since last release" >> $GITHUB_OUTPUT
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:'- %s' ${PREV_TAG}..HEAD >> $GITHUB_OUTPUT
          else
            git log --pretty=format:'- %s' >> $GITHUB_OUTPUT
          fi
          echo >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES="${{ steps.notes.outputs.notes }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TAG}" --notes "${NOTES}"
          else
            gh release create "${TAG}" --title "${TAG}" --notes "${NOTES}" --verify-tag
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "${TAG}" $(find dist -type f) --clobber
